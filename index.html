<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Windbnb</title>
  <link rel="stylesheet" href="./style.css">
  
</head>
<body class="p-4 md:p-8 text-gray-800">
  <!-- Header / Barra de Búsqueda -->
  <header id="encabezado">
    <!-- Se carga de manera dinámica desde nav.js -->
  </header>

  <!-- Título y Contador -->
  <section class="flex justify-between items-center mb-6">
    <h1 id="tituloStays" class="text-xl md:text-2xl font-bold">Stays in Finland</h1>
    <span id="stayContador" class="text-sm font-medium">0 stays</span>
  </section>

  <!-- Cuadrícula de Alojamientos -->
  <main id="departamentos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <div
          id="background-opacity"
          class="hidden absolute inset-0 bg-black/40 z-40"
      ></div>
    <!-- Las cards se cargaran  aquí desde main.js -->
  </main>

  <script type="module" src="/js/main.js"></script>
  <script type="module" src="/js/nav.js"></script>
 </body>
</html>
